# =============================================================================
# Paises API — Perfil PRODUCCIÓN (prod)
# =============================================================================

# MongoDB Atlas (obligatorio via variable de entorno)
spring.data.mongodb.uri=${MONGODB_URI}

# Logging (solo warnings y errores)
logging.level.root=WARN
logging.level.com.numismatica=INFO

# JWT (token expira en 1 hora en producción)
app.jwt.expiration-ms=3600000

# CORS (obligatorio via variable de entorno)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Swagger deshabilitado en producción
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator restrictivo
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
