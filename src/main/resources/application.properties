# =============================================================================
# Paises API — Configuración Base
# =============================================================================

spring.application.name=paises-api

# Perfil activo (por defecto: dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# MongoDB (se sobreescribe por perfil)
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://espinozaplazarodrigo:iqLOKaV7ZAutdhFR@cluster0.gip4i.mongodb.net/numismatica}

# Servidor
server.port=${PORT:8080}
server.servlet.context-path=/

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# JWT
app.jwt.secret=${JWT_SECRET:MiClaveSecretaSuperSeguraParaJWTDebeSerAlMenos256BitsDebeSerMuyLarga2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
